name: Audit
on:
  pull_request:
    paths:
      - .github/workflows/audit-dev.yml
      - .ndmrc
      - .nsprc
      - package-lock.json
  push:
    branches:
      - main
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch: ~

permissions: read-all

jobs:
  deprecations:
    name: Deprecations
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          persist-credentials: false
      - name: Install Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: npm
          node-version-file: .nvmrc
      - name: Install dependencies
        run: npm clean-install
      - name: Audit for deprecation warnings
        run: npm run audit:deprecations
  vulnerabilities:
    name: Vulnerabilities
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          persist-credentials: false
      - name: Install Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: npm
          node-version-file: .nvmrc
      - name: Install dependencies
        run: npm clean-install
      - name: Audit for vulnerabilities
        run: npm run audit:vulnerabilities
      - name: Bump vulnerable dependencies
        if: ${{ github.event_name == 'schedule' && failure() }}
        run: npm audit fix
      - name: Create automation token
        if: ${{ github.event_name == 'schedule' && failure() }}
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: automation-token
        with:
          app-id: ${{ secrets.AUTOMATION_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}
      - name: Create Pull Request
        if: ${{ github.event_name == 'schedule' && failure() }}
        env:
          REPOSITORY: ${{ github.repository }}
          TOKEN: ${{ steps.automation-token.outputs.token }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          git checkout -B 'bump-vulnerable-dependencies'
          git add 'package.json' 'package-lock.json'
          git commit --message 'Fix vulnerable dependencies with `npm audit fix`'

          git remote set-url 'origin' "https://x-access-token:${TOKEN}@github.com/${REPOSITORY}"
          git push --force 'origin' 'bump-vulnerable-dependencies'

          gh pr create \
            --base='main' --head='bump-vulnerable-dependencies' \
            --label='dependencies' --label='security' \
            --title='Update vulnerable dependencies' \
            --body='_This Pull Request was created automatically based on at least one known vulnerability detected in CI._'
